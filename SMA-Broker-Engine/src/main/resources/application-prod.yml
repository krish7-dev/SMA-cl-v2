# ─── Broker Engine — Production Profile ─────────────────────────────────────
# Activated by: SPRING_PROFILES_ACTIVE=prod
# All secrets MUST be supplied as environment variables — no defaults here.

spring:
  jpa:
    show-sql: false

# In production, CORS_ALLOWED_ORIGINS must be set to the deployed frontend URL.
# Example: https://yourapp.vercel.app
# The base application.yml default (localhost) is intentionally overridden to
# empty here so the service fails loudly if the env var is not set in prod.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    com.sma.brokerengine: INFO
    org.flywaydb: WARN
    org.hibernate: WARN

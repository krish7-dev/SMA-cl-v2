server:
  port: 9003

spring:
  application:
    name: sma-broker-engine

  datasource:
    url: jdbc:postgresql://db.ubcfqlqowoybswafwyun.supabase.co:5432/postgres
    username: postgres
    password: SMARootKrishna
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

broker:
  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY:changeme-32-char-secret-key-here!}
    algorithm: AES/GCM/NoPadding

logging:
  level:
    com.sma.brokerengine: INFO
    org.flywaydb: INFO

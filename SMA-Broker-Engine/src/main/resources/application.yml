server:
  port: ${SERVER_PORT:9003}

spring:
  application:
    name: sma-broker-engine

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:3}
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

broker:
  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY}
    algorithm: AES/GCM/NoPadding

# CORS — comma-separated list of allowed frontend origins.
# Dev default allows both CRA and Vite dev servers.
# Production: set CORS_ALLOWED_ORIGINS to your deployed frontend URL (e.g. https://yourapp.vercel.app)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.sma.brokerengine: INFO
    org.flywaydb: INFO

server:
  port: 9005

spring:
  application:
    name: sma-data-engine

  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.ubcfqlqowoybswafwyun
    password: SMARootKrishna
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sma.dataengine: INFO
    com.zerodhatech: WARN

# ─── Data Engine — Replay Configuration ────────────────────────────────────────
data:
  replay:
    # Thread pool size for concurrent replay sessions
    scheduler-pool-size: 4
    # Max candles to load into memory per replay session
    max-candles-per-session: 100000

  # Broker Engine base URL — used for future inter-service calls (e.g. token resolution)
  broker-engine:
    base-url: ${BROKER_ENGINE_URL:http://localhost:9003}

server:
  port: ${SERVER_PORT:9005}

spring:
  application:
    name: sma-data-engine

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:3}
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# CORS — comma-separated list of allowed frontend origins.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.sma.dataengine: INFO
    com.zerodhatech: WARN

# ─── Data Engine — Replay Configuration ─────────────────────────────────────
data:
  replay:
    scheduler-pool-size: ${DATA_REPLAY_POOL_SIZE:4}
    max-candles-per-session: 100000

  broker-engine:
    base-url: ${BROKER_ENGINE_URL:http://127.0.0.1:9003}

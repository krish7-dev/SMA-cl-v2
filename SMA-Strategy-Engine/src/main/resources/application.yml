server:
  port: ${SERVER_PORT:9006}

spring:
  application:
    name: sma-strategy-engine

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:3}
      minimum-idle: 1
      connection-timeout: 30000
      max-lifetime: 600000
      keepalive-time: 30000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_strategy
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms

strategy:
  execution-engine:
    base-url: ${EXECUTION_ENGINE_URL:http://127.0.0.1:9004}
  data-engine:
    base-url: ${DATA_ENGINE_URL:http://127.0.0.1:9005}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
    info:
      enabled: true
  info:
    build:
      enabled: true
    git:
      enabled: false
    java:
      enabled: true

# CORS — comma-separated list of allowed frontend origins.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.sma.strategyengine: INFO

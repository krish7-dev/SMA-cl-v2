server:
  port: 9006

spring:
  application:
    name: sma-strategy-engine

  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.ubcfqlqowoybswafwyun
    password: SMARootKrishna
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_strategy
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

strategy:
  execution-engine:
    base-url: ${EXECUTION_ENGINE_URL:http://localhost:9004}
  data-engine:
    base-url: ${DATA_ENGINE_URL:http://localhost:9005}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sma.strategyengine: INFO

server:
  port: ${SERVER_PORT:9007}

spring:
  application:
    name: sma-ai-engine

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:2}
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_ai
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
    info:
      enabled: true
  info:
    build:
      enabled: true
    git:
      enabled: false
    java:
      enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    enabled: ${OPENAI_ENABLED:false}
    timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:15}
    max-tokens: ${OPENAI_MAX_TOKENS:1000}
    reasoning-timeout-seconds: ${OPENAI_REASONING_TIMEOUT_SECONDS:60}
    reasoning-max-tokens: ${OPENAI_REASONING_MAX_TOKENS:16000}

    # ── Uncomment ONE experiment block, comment the rest, then restart ────────
    #
    # [1] Baseline — gpt-4o-mini · chat_completions · strict
    # model: gpt-4o-mini
    # api-mode: chat_completions
    # prompt-mode: strict
    # reasoning-effort:
    #
    # [2] Reasoning Strict — o3 · responses · strict · effort=medium
    # model: o3
    # api-mode: responses
    # prompt-mode: strict
    # reasoning-effort: medium
    #
    # [3] Reasoning Minimal — o3 · responses · minimal · effort=medium
    # model: o3
    # api-mode: responses
    # prompt-mode: minimal
    # reasoning-effort: medium
    #
    # [4] Reasoning Hybrid — o3 · responses · hybrid · effort=medium
    model: o3
    api-mode: responses
    prompt-mode: hybrid
    reasoning-effort: medium
    # ─────────────────────────────────────────────────────────────────────────

logging:
  level:
    com.sma.aiengine: INFO

server:
  port: 9004

spring:
  application:
    name: sma-execution-engine

  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.ubcfqlqowoybswafwyun
    password: SMARootKrishna
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Fresh table name — previous attempts left flyway_schema_history_execution with a
    # stale V1 baseline entry that caused V1 SQL to be skipped. This name is clean.
    table: flyway_schema_history_exec
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sma.executionengine: INFO

# ─── Execution Engine — Inter-service Configuration ─────────────────────────
execution:
  broker-engine:
    base-url: ${BROKER_ENGINE_URL:http://localhost:9003}
  risk:
    # Default maximum notional value per order (0 = disabled)
    max-notional-per-order: ${RISK_MAX_NOTIONAL:0}
    # Default maximum quantity per order (0 = disabled)
    max-quantity-per-order: ${RISK_MAX_QTY:0}

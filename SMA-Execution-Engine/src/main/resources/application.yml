server:
  port: ${SERVER_PORT:9004}

spring:
  application:
    name: sma-execution-engine

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:3}
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_exec
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
    info:
      enabled: true
  info:
    build:
      enabled: true
    git:
      enabled: false
    java:
      enabled: true

# CORS — comma-separated list of allowed frontend origins.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.sma.executionengine: INFO

# ─── Execution Engine — Inter-service Configuration ─────────────────────────
execution:
  broker-engine:
    base-url: ${BROKER_ENGINE_URL:http://127.0.0.1:9003}
  risk:
    max-notional-per-order: ${RISK_MAX_NOTIONAL:0}
    max-quantity-per-order: ${RISK_MAX_QTY:0}
